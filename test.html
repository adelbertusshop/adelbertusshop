<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Adelbertus</title>
  <meta name="description" content="To jest strona testowa sklepu Adelbertus – sprawdzamy jak działa widoczność w Google.">
</head>
<body>
  <h1>Strona testowa Adelbertus</h1>
  <p>Witaj! To jest testowa podstrona sklepu Adelbertus. Jeśli to widzisz, wszystko działa poprawnie 🚀</p>

  <!-- ========================== -->
  <!--  TUTAJ JS SUPABASE       -->
  <!-- ========================== -->
  <script type="module">
    // 1️⃣ Supabase setup
    const supabaseUrl = 'https://TU_WKLEJ_SWÓJ_URL.supabase.co'; // <-- ZAMIENIĆ NA SWÓJ URL
    const supabaseKey = 'sb_publishable_JZBxEamVDWCPxHxEhlhHNg_dpug9inG'; // <-- TWÓJ KLUCZ SUPABASE
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 2️⃣ Fetch danych z tabeli
    async function getData() {
      // <-- ZAMIENIĆ 'nazwa_tabeli' NA SWOJĄ TABELĘ, np. 'produkty'
      let { data, error } = await supabase.from('polecenia').select('*'); 
      if (error) {
        console.error('Błąd fetch:', error);
      } else {
        console.log('Tabela polecenia:', data);
      }
    }

    // 3️⃣ Uruchomienie fetch
    getData();
  </script>
  <!-- ========================== -->

</body>
</html>
