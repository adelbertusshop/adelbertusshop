<h1 style="font-size:2rem; margin-bottom:1rem;">Adelbertus Test</h1>
<p style="margin-bottom:1rem;">Dane z Supabase w czystej wersji:</p>

<script>
  // 🔥 Twoje Supabase
  const supabaseUrl = 'https://oujlhtzyvdplyrezibiy.supabase.co';
  const supabaseKey = 'sb_publishable_JZBxEamVDWCPxHxEhlhHNg_dpug9inG';

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  // 🔥 Pobieranie danych
  async function getData() {
    let { data, error } = await supabase.from('polecenia').select('*');

    if (error) {
      console.error('BŁĄD:', error);
    } else {
      console.log('DANE:', data);
      // 🔹 dodatkowo pokazujemy od razu na stronie
      const pre = document.createElement('pre');
      pre.textContent = JSON.stringify(data, null, 2);
      document.body.appendChild(pre);
    }
  }

  getData();
</script>

</body>
